[build]
  base = "website"
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Canonical site URL — baked into metadata, sitemap, robots, OG tags,
  # and LocalBusiness structured data at build time.
  NEXT_PUBLIC_SITE_URL = "https://hisandhermedspa.ca"
  # Pin Node so production builds are reproducible.
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long-lived caching for static photos (referenced via next/image,
# which fingerprints its own optimized URLs).
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# ───────────────────────────────────────────────────────────────
# SITE PAUSED — every route serves the "launching soon" holding page
# with a 503 so search engines don't index it yet.
# TO GO LIVE: delete this whole block (down to the end marker) and push.
[[redirects]]
  from = "/*"
  to = "/maintenance.html"
  status = 503
  force = true
# ── end pause block ────────────────────────────────────────────
